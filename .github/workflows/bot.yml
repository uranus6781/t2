name: ⚽ Scrape Bóng Đá M3U8

on:
  schedule:
    - cron: '*/30 * * * *'

  workflow_dispatch:

jobs:
  scrape:

    runs-on: ubuntu-22.04

    timeout-minutes: 20

    steps:

    # =====================================================
    # CHECKOUT
    # =====================================================
    - name: 📥 Checkout
      uses: actions/checkout@v4

    # =====================================================
    # PYTHON
    # =====================================================
    - name: 🐍 Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    # =====================================================
    # CACHE PLAYWRIGHT
    # =====================================================
    - name: 💾 Cache Playwright
      uses: actions/cache@v4
      with:
        path: ~/.cache/ms-playwright
        key: ${{ runner.os }}-playwright

    # =====================================================
    # INSTALL DEPENDENCIES
    # =====================================================
    - name: 📦 Install dependencies
      run: |

        python -m pip install --upgrade pip

        pip install -r requirements.txt

        playwright install --with-deps chromium

    # =====================================================
    # DEBUG ENV
    # =====================================================
    - name: 🔍 Debug Environment
      run: |
        python --version
        pip list
        playwright --version

    # =====================================================
    # RUN BOT
    # =====================================================
    - name: 🚀 Run scraper
      env:
        GH_TOKEN: ${{ secrets.GH_TOKEN }}
        GH_REPO: ${{ github.repository }}

      run: |

        python main.py

    # =====================================================
    # SHOW RESULT
    # =====================================================
    - name: 📄 Check result
      run: |

        echo "===== FILES ====="

        ls -la

        echo "===== JSON ====="

        if [ -f bongda.json ]; then

          echo "✅ bongda.json created"

          cat bongda.json | head -20

        else

          echo "❌ bongda.json missing"

          exit 1

        fi
